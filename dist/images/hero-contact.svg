<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#224c38"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="600" fill="url(#bg)"/>
  <!-- Phone/contact icon suggestion -->
  <g opacity="0.06" fill="none" stroke="#43a96d" stroke-width="2">
    <rect x="1620" y="180" width="160" height="240" rx="20"/>
    <circle cx="1700" cy="380" r="12"/>
    <line x1="1660" y1="210" x2="1740" y2="210"/>
  </g>
  <!-- Envelope shape -->
  <g opacity="0.05" fill="none" stroke="#6bc48e" stroke-width="1.5">
    <rect x="120" y="350" width="180" height="120" rx="8"/>
    <polyline points="120,350 210,420 300,350"/>
  </g>
  <!-- Scattered small trees -->
  <g opacity="0.07" fill="#388e5c">
    <polygon points="500,600 525,530 550,600"/>
    <polygon points="800,600 830,510 860,600"/>
    <polygon points="1100,600 1125,540 1150,600"/>
    <polygon points="1400,600 1430,520 1460,600"/>
  </g>
  <!-- Organic curves -->
  <g opacity="0.04" fill="none" stroke="#c9a66b" stroke-width="1">
    <path d="M0,550 Q480,500 960,530 Q1440,560 1920,510"/>
    <path d="M0,570 Q480,530 960,555 Q1440,580 1920,540"/>
  </g>
</svg>
