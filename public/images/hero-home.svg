<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="50%" stop-color="#224c38"/>
      <stop offset="100%" stop-color="#2d6347"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#sky)"/>
  <!-- Tree silhouettes - back row (lighter) -->
  <g opacity="0.08" fill="#43a96d">
    <polygon points="200,800 260,400 320,800"/>
    <polygon points="280,800 350,350 420,800"/>
    <polygon points="500,800 580,380 660,800"/>
    <polygon points="700,800 750,420 800,800"/>
    <polygon points="900,800 970,360 1040,800"/>
    <polygon points="1100,800 1160,400 1220,800"/>
    <polygon points="1300,800 1380,370 1460,800"/>
    <polygon points="1550,800 1610,410 1670,800"/>
    <polygon points="1750,800 1820,380 1890,800"/>
  </g>
  <!-- Tree silhouettes - mid row -->
  <g opacity="0.12" fill="#388e5c">
    <polygon points="100,800 180,450 260,800"/>
    <polygon points="350,800 440,420 530,800"/>
    <polygon points="600,800 670,470 740,800"/>
    <polygon points="800,800 880,400 960,800"/>
    <polygon points="1050,800 1130,440 1210,800"/>
    <polygon points="1250,800 1340,410 1430,800"/>
    <polygon points="1500,800 1570,460 1640,800"/>
    <polygon points="1700,800 1790,390 1880,800"/>
  </g>
  <!-- Tree silhouettes - front row (darker, bigger) -->
  <g opacity="0.15" fill="#1a3a2a">
    <polygon points="50,800 150,500 250,800"/>
    <polygon points="300,800 420,480 540,800"/>
    <polygon points="550,800 650,520 750,800"/>
    <polygon points="780,800 880,490 980,800"/>
    <polygon points="1000,800 1110,470 1220,800"/>
    <polygon points="1230,800 1330,510 1430,800"/>
    <polygon points="1460,800 1580,480 1700,800"/>
    <polygon points="1720,800 1830,500 1920,800"/>
  </g>
  <!-- Subtle light rays -->
  <g opacity="0.04" fill="#6bc48e">
    <polygon points="960,0 920,800 1000,800"/>
    <polygon points="1100,0 1060,800 1140,800"/>
    <polygon points="800,0 770,800 830,800"/>
    <polygon points="1300,0 1280,800 1320,800"/>
  </g>
</svg>
